## 🎯👹 B14 — JUSTICE & THEORIES OF JUSTICE

**14.1 (10) MC.** Los **tres tipos de justicia** son:
- A) **Corrective, Distributive, Formal** ✅  B) civil, criminal, constitutional
*Por qué:* son las tres caras de la justicia como concepto moral aplicado al derecho.

**14.2 (20) MC.** **Corrective justice** es:
- A) repartir bienes  B) **rectificar daños entre dos partes, restaurar el equilibrio** (la balanza) ✅
*Por qué:* se discute en tort y contract law; símbolo: las **scales** (equilibrio) y la **blindfold** (imparcialidad).

**14.3 (20) MC.** Los tres valores de la **distributive justice** democrática son:
- A) **Freedom, Equality, Solidarity** ✅
*Por qué:* "giving each his/her due" estructurando sociedad y gobierno.

**14.4 (20) Corta.** Principio clave de la **formal justice**.
*R:* Las reglas se aplican al **acto, no al actor** (depersonalización); es la base de la **legal certainty** (ej. **habeas corpus**, **in dubio pro reo**).

**14.5 (20) MC.** **Ross** decía que invocar la justicia es:
- A) un argumento racional  B) **"banging on the table"**: expresión emocional / persuasión, no argumento ✅

**14.6 (20) MC.** El **utilitarismo** sostiene que la justicia es:
- A) respetar la propiedad  B) **maximizar la felicidad** (Bentham: pain/pleasure, **principle of utility**) ✅

**14.7 (20) Corta.** **Transplant dilemma**: act vs rule utilitarian.
*R:* **Act**: sacrificar al sano para salvar a 5 (maximiza vidas **inmediatas**). **Rule**: "no matar nunca a un sano para sus órganos" (preserva la **confianza** en la medicina). El **rule utilitarianism** es el más relevante en derecho.

**14.8 (30) MC.** **Rawls** propone:
- A) **veil of ignorance + maximin**: eliges las reglas sin saber tu posición, y maximizas la posición del **peor situado** ✅
*Por qué:* sus **dos principios**: (1) **equal basic liberties** para todos; (2) **democratic equality of opportunity**.

**14.9 (30) MC.** **Nozick** defiende:
- A) un Estado fuerte redistribuidor  B) **un minimal state + entitlement theory**: la distribución actual es justa salvo prueba en contra; **voluntary exchange**; liberty y equality son incompatibles ✅

**👹 JEFE FINAL B14 (50).** Compara **Utilitarianism vs Rawls vs Nozick** (una idea cada uno).
*Modelo:* **Utilitarianism** = la mayor felicidad para el mayor número (riesgo: sacrifica al individuo/minoría — *devaluation of personhood*, majoritarianism). **Rawls** = *justice as fairness*: lo que elegirías tras el **veil of ignorance**, protegiendo al **menos aventajado** (maximin). **Nozick** = **minimal state**: justicia = respetar **property rights** e intercambios **voluntarios**, sin imponer patrones de distribución.

## 🎯👹 B15 — CIVIL LAW TRADITION (Roman Law · Ius Commune · Features)

**15.1 (10) MC.** Los **tres pilares** del civil law son:

## 🎯👹 B16 — COMMON LAW HISTORY

**16.1 (10) MC.** ¿Quién mandó jueces por **circuitos** unificando el derecho inglés?
- A) **Henry II (1154-1189)** ✅
*Por qué:* sus circuit judges crearon un derecho "**common to all**".

**16.2 (10) MC.** Antes de 1066, el derecho inglés era esencialmente:
- A) romano  B) **Germanic folk-law (anglosajón)** ✅

**16.3 (20) MC.** El **writ system** funcionaba así:
- A) **las acciones empezaban con un writ del chancery; sin un writ que encajara (Register of Writs), no había remedio** → "forms of action" ✅

**16.4 (20) Corta.** ¿Por qué el writ system llevó a la **equity**?
*R:* Por su **rigidez**: reglas estrictas y "sin writ no hay remedio" producían **injusticia**, así que se desarrolló la **equity** para remediarlo.

**16.5 (20) MC.** **Bentham** y **Austin** criticaron el common law como:
- A) **"merely imaginary" (Bentham) / "childish fiction" — declaratory theory (Austin)** ✅
*Por qué:* se burlaban de la idea de que los jueces "declaran" un derecho eterno en vez de crearlo.

**16.6 (30) MC.** Los **cuatro factores de supervivencia** del common law en el s. XVI:
- A) **monarcas Tudor refashion (no eliminan); nuevos tribunales (Chancery, Star Chamber); el restatement de Coke; los Inns of Court ("toughness of a taught tradition")** ✅

**👹 JEFE FINAL B16 (50).** Explica cómo el **writ system** fue a la vez la **base** y la **debilidad** del common law.
*Modelo:* El writ system (**writs** del chancery, **forms of action**) **creó** el derecho común al estandarizar acciones y procedimientos (**procedure antes que substance**); pero su **rigidez** (sin un writ que encajara no había remedio) producía **injusticia**, lo que dio lugar a la **equity**. En el s. XVI casi sucumbe ante la presión del Roman law, pero sobrevive por **4 factores** (Tudor, nuevos tribunales, Coke, Inns of Court).

**🃏 Flashcards B16:**
- P: Derecho inglés pre-1066 → R: Germanic folk-law (anglosajón).

**⚔️ Misión — La Fortaleza de los Writs de Hierro.** En la Inglaterra de **Henry II**, jueces-jinetes recorren circuitos forjando un derecho común. Para demandar necesitas un **writ** del Register; si tu agravio no tiene writ, te quedas **sin remedio** (¡por eso en la misión vecina nace la **Equity**!). En el s. XVI la fortaleza casi cae, pero **4 guardianes** (Tudor, nuevos tribunales, Coke, Inns of Court) la salvan. *Jefe:* el Burócrata de las Forms of Action. *Loot:* writ system, forms of action.

## 🎯👹 B17 — EUROPEAN UNION (Understanding + Scope & Intensity)

**17.1 (10) MC.** La UE es:
- A) una federación como EEUU  B) **ni federación (EEUU) ni mera OI (ONU): pools sovereignty** ✅

**17.2 (20) MC.** **Van Gend en Loos (1963)** estableció:
- A) **el direct effect** (el derecho UE crea derechos para los individuos que los tribunales nacionales deben proteger) ✅

**17.3 (20) MC.** **Costa v ENEL (1964)** estableció:
- A) **la primacy** del derecho UE sobre el nacional en conflicto ✅
*Por qué:* definió el derecho UE como "**an independent source of law**".

**17.4 (20) Corta.** ¿Qué tratado **creó la UE** y cuándo? ¿Y cuál reformó su estructura?
*R:* La creó **Maastricht (1993)**; la reformó **Lisbon (2009)** (tras el rechazo del Constitutional Treaty).

**17.5 (20) MC.** Los **tres principios** que rigen el alcance de la UE:
- A) **enumeration/conferral, subsidiarity, proportionality** ✅
*Por qué:* qué puede hacer (enumeration), cuándo debe (subsidiarity) y hasta dónde (proportionality).

**17.6 (20) MC.** Las competencias de la UE se clasifican en:
- A) **exclusive / shared / complementary** ✅
*Por qué:* en las **shared**, si hay conflicto **prevalece el derecho UE** (supremacy).

**17.7 (30) MC.** Según el **Art. 288 TFEU**:
- A) **Regulations** (directly applicable, sin transposición), **Directives** (binding as to result, con transposition, libres en forma/método), **Decisions** (binding) ✅
*Por qué:* recommendations y opinions **no** son vinculantes.

**👹 JEFE FINAL B17 (50).** Diferencia **Regulation** vs **Directive** y explica la **subsidiarity**.
*Modelo:* **Regulation** = general, **vinculante en su totalidad** y **directamente aplicable** en todos los Estados (sin transposición). **Directive** = **vinculante en cuanto al resultado**, pero los Estados eligen **forma y método** y deben **transponerla** en un plazo. **Subsidiarity** = la UE solo actúa si los Estados **no pueden** lograr suficientemente los objetivos; se prefiere la **acción nacional** cuando es igual de eficaz (los parlamentos nacionales pueden sacar "**yellow cards**").

**🃏 Flashcards B17:**
- P: ¿Qué es la UE? → R: entidad única que **pools sovereignty** (ni federación ni mera OI).
- P: Van Gend en Loos (1963) → R: **direct effect**.
- P: Costa v ENEL (1964) → R: **primacy** del derecho UE.
- P: ¿Tratado que creó la UE? → R: **Maastricht, 1993**.
- P: ¿Tratado actual? → R: **Lisbon, 2009**.
- P: Hitos fundacionales → R: ECSC **1951**, EEC (Treaties of Rome) **1957**.
- P: 3 pilares (1993-2009) → R: EC (supranacional) / CFSP / JHA (intergubernamentales).
- P: Instituciones → R: Parliament, Council, Commission, Court of Justice.
- P: 3 principios de alcance → R: enumeration, subsidiarity, proportionality.
- P: Competencias → R: exclusive / shared / complementary.
- P: Art 288 TFEU → R: Regulations / Directives / Decisions.

**🧠 Mnemo:** Límites de la UE = **"ESP"** (**E**numeration / **S**ubsidiarity / **P**roportionality). Casos: **"VGL = direct effect; Costa = primacy"** (*Costa cuesta más → prevalece*). Art 288 = **"R-D-D"** (Regulations directas, Directives se transponen, Decisions). Instituciones = **"PCCC"** (Parliament/Council/Commission/Court).

**⚔️ Misión — El Consejo de las Estrellas Azules.** 27 reinos ceden parte de su soberanía a un Consejo con bandera de estrellas. Dos hechizos fundacionales: **Van Gend en Loos** (los ciudadanos ganan **derechos directos**) y **Costa v ENEL** (la ley del Consejo **manda** sobre la de los reinos). El Consejo solo actúa dentro de lo **conferido** (enumeration), si los reinos no bastan (subsidiarity) y **sin pasarse** (proportionality). *Jefe:* el Acertijo Regulation vs Directive. *Loot:* primacy, direct effect, Art. 288.

<script>
"use strict";
/* ---------- util ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inl(s){
  s=esc(s);
  s=s.replace(/\*\*([^*]+?)\*\*/g,'<b>$1</b>');
  s=s.replace(/(^|[^*])\*([^*]+?)\*(?!\*)/g,'$1<i>$2</i>');
  s=s.replace(/`([^`]+?)`/g,'<span class="kbd">$1</span>');
  return s;
}
function el(html){var d=document.createElement('div');d.innerHTML=html;return d;}
var toastT;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1700);}

/* ---------- parser ---------- */
function parseGame(md){
  var lines=md.split(/\r?\n/);
  var blocks={};
  var cur=null,flash=false,q=null,jefe=false,inTrucos=false;
  var trucos=[];
  function getB(n,title){
    if(!blocks[n])blocks[n]={id:n,title:title||('Bloque '+n),questions:[],flashcards:[],mnemo:[],mision:'',jefe:null,raw:[]};
    if(title)blocks[n].title=title;
    return blocks[n];
  }
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    var hm=ln.match(/^#{1,6}\s+(.*)$/);
    if(hm){
      var txt=hm[1];
      var bm=txt.match(/B(?:LOQUE)?\s*0*(\d+)\b/i);
      var isBlockHdr=bm && /🎯|🃏|👹/.test(txt);
      if(isBlockHdr){
        var n=+bm[1];
        var t=txt.replace(/B(?:LOQUE)?\s*0*\d+/i,'').replace(/[🎯🃏👹🔥⚔️🧠🗺️🏆🌅🌍🔬⛰️🏰♟️📜🛡️🕊️🏜️]/g,'')
                 .replace(/^[\s—\-·:]+/,'').replace(/\*\*/g,'').trim();
        cur=getB(n,t||('Bloque '+n));
        flash=/🃏/.test(txt)&&!/🎯/.test(txt);
        q=null;jefe=false;inTrucos=false;
        continue;
      }
      // global trucos / mnemo section
      inTrucos=/TRUCOS|MNEMOTECNIA/i.test(txt);
      cur=null;flash=false;q=null;jefe=false;
      continue;
    }
    if(inTrucos){ if(ln.trim())trucos.push(ln); continue; }
    if(!cur)continue;
    cur.raw.push(ln);

    // question start: **N.N (pts) label** rest
    var qm=ln.match(/^\*\*\s*(\d+)\.(\d+)\s*\((\d+)\s*(?:pts?|puntos)?\)\s*([^*]*?)\*\*\s*(.*)$/);
    if(qm){
      var pts=+qm[3], label=(qm[4]||'').trim(), text=(qm[5]||'').trim();
      var type=/m[uú]ltiple|\bMC\b/i.test(label)?'mc':'reveal';
      q={pts:pts,type:type,q:text,label:label,opts:[],correct:-1,expl:'',ans:''};
      cur.questions.push(q);jefe=false;
      continue;
    }
    // jefe final
    if(/JEFE\s+FINAL/i.test(ln)&&/^\*\*/.test(ln)){
      var jm=ln.match(/\((\d+)[^)]*\)\.?\*\*\s*(.*)$/);
      var jq=jm?jm[2]:ln.replace(/^\*\*[^]*?\*\*/,'').trim();
      cur.jefe={pts:50,q:(jq||'').trim(),ans:''};jefe=true;q=null;
      continue;
    }
    // options (one-per-line OR inline multi)
    var om=ln.match(/^\s*-\s*[A-D]\)/);
    if(om&&q){
      var body=ln.replace(/^\s*-\s*/,'');
      // split a line into one or more "X) ..." option segments (handles inline multi-option)
      var segs=body.split(/\s(?=[A-D]\)\s)/);
      for(var s=0;s<segs.length;s++){
        var seg=segs[s].trim();
        var m2=seg.match(/^([A-D])\)\s*([\s\S]*)$/);
        if(!m2)continue;
        var otxt=m2[2].trim(),correct=false;
        if(otxt.indexOf('✅')>=0){correct=true;otxt=otxt.replace(/✅/g,'').trim();}
        if(otxt){q.opts.push(otxt);if(correct)q.correct=q.opts.length-1;}
      }
      continue;
    }
    // markers: *Por qué:* / *R:* / *Respuesta:* / *Modelo:* / *Respuesta modelo:*
    var mk=ln.match(/^\*([^*]+?):\*\s*(.*)$/);
    if(mk){
      var key=mk[1].trim().toLowerCase(), val=mk[2].trim();
      if(jefe&&cur.jefe){ if(/modelo|respuesta/.test(key)) cur.jefe.ans=val; }
      else if(q){
        if(/qu[eé]/.test(key)) q.expl=val;
        else if(/^(r|resp|respuesta)$/.test(key)) q.ans=val;
        else if(/modelo/.test(key)) q.ans=val;
      }
      continue;
    }
    // flashcards part2: - P: ... → R: ...
    var fp=ln.match(/^-\s*P:\s*([\s\S]+?)\s*(?:→|->)\s*R:\s*([\s\S]+)$/);
    if(fp){ cur.flashcards.push({p:fp[1].trim(),a:fp[2].trim()}); continue; }
    // flashcards part1: table rows
    if(flash&&/^\s*\|/.test(ln)){
      var cells=ln.split('|').map(function(c){return c.trim();}).filter(function(c){return c.length;});
      if(cells.length>=2){
        var c0=cells[0],c1=cells[1];
        if(/^pregunta/i.test(c0)||/^respuesta/i.test(c1)||/^:?-{2,}:?$/.test(c0)||/^:?-{2,}:?$/.test(c1)){/*skip*/}
        else cur.flashcards.push({p:c0,a:c1});
      }
      continue;
    }
    // mnemo part2
    var mn=ln.match(/🧠\s*Mnemo:?\**\s*(.*)$/i);
    if(mn&&mn[1]){ cur.mnemo.push(mn[1].replace(/\*\*$/,'').trim()); continue; }
    // mission part2
    var ms=ln.match(/⚔️\s*Misi[oó]n[^*]*\**\s*(.*)$/i);
    if(ms){ cur.mision=(cur.mision?cur.mision+' ':'')+ln.replace(/^\*\*|\*\*$/g,'').trim(); continue; }
  }
  // finalize
  var arr=Object.keys(blocks).map(function(k){return blocks[k];}).sort(function(a,b){return a.id-b.id;});
  arr.forEach(function(b){
    b.questions.forEach(function(qq){
      if(qq.type==='mc'&&qq.opts.length<2){qq.type='reveal';if(!qq.ans&&qq.opts[0])qq.ans=qq.opts[0];}
      if(qq.type==='mc'&&qq.correct<0)qq.correct=0;
      qq.maxpts=qq.pts;
    });
    b.maxXP=b.questions.reduce(function(a,qq){return a+qq.pts;},0)+(b.jefe?50:0);
  });
  return {blocks:arr,trucos:trucos};
}

/* ---------- state / persistence ---------- */
var KEY='legalquest2026';
var save={total:0,best:{},jefe:{}};
try{var raw=localStorage.getItem(KEY);if(raw)save=JSON.parse(raw);}catch(e){}
if(!save.best)save.best={};if(!save.jefe)save.jefe={};
function persist(){try{localStorage.setItem(KEY,JSON.stringify(save));}catch(e){}}
function totalXP(){
  var t=0;for(var k in save.best)t+=save.best[k]||0;for(var j in save.jefe)if(save.jefe[j])t+=50;return t;
}
var RANKS=[
  [0,'🪣 Becario del bufete'],[401,'📎 Pasante con ínfulas'],[901,'👔 Abogado junior'],
  [1501,'⚖️ Abogado litigante'],[2201,'🎓 Catedrático'],[2901,'👑 Juez del Tribunal Supremo']
];
function rankFor(xp){var r=RANKS[0];for(var i=0;i<RANKS.length;i++)if(xp>=RANKS[i][0])r=RANKS[i];return r;}
function nextThreshold(xp){for(var i=0;i<RANKS.length;i++)if(xp<RANKS[i][0])return RANKS[i][0];return RANKS[RANKS.length-1][0];}
function refreshXP(){
  var xp=totalXP();
  document.getElementById('rank').textContent=rankFor(xp)[1];
  document.getElementById('xpnum').textContent='· '+xp+' XP';
  var nt=nextThreshold(xp);var prev=rankFor(xp)[0];
  var pct=nt>prev?Math.min(100,Math.round((xp-prev)/(nt-prev)*100)):100;
  if(xp>=2901)pct=100;
  document.getElementById('fill').style.width=pct+'%';
}

/* ---------- game data ---------- */
var DATA=parseGame(document.getElementById('src').textContent);
var GAME=DATA.blocks;
var app=document.getElementById('app');

/* ---------- screens ---------- */
function home(){
  refreshXP();
  document.getElementById('hint').textContent='Mapa del Reino · '+GAME.length+' misiones';
  var h='<div class="card center"><h1>⚖️ LegalQuest 2026</h1><div class="sub">Las Crónicas del Reino de Legalia · '+GAME.length+' misiones</div>'+
    '<div class="small">Examen: Introduction to Legal Systems · mié 24 jun · 9:00 · C4-2</div></div>';
  h+='<div class="grid">';
  GAME.forEach(function(b,idx){
    var best=save.best[b.id]||0; var jd=save.jefe[b.id];
    var done=(b.maxXP>0 && best>=Math.round(b.maxXP*0.7-(b.jefe?50:0)*0)); // visual only
    var passed = best>0 && best>=Math.round((b.maxXP-(b.jefe?50:0))*0.7);
    h+='<div class="tile" onclick="block('+idx+')">'+
       (passed?'<span class="done">✅</span>':'')+
       '<div class="n">Misión '+(idx+1)+'</div>'+
       '<div class="t">'+inl(b.title)+'</div>'+
       '<div class="m">'+b.questions.length+' preguntas · '+b.flashcards.length+' flashcards'+(b.jefe?' · 👹 jefe':'')+'</div>'+
       '<span class="tag">⭐ '+best+(jd?' · 👑':'')+' XP</span>'+
       '</div>';
  });
  h+='</div>';
  h+='<div class="card btn-row"><button onclick="trucos()">🧠 Trucos &amp; Mnemotecnia</button><button onclick="resetAll()">♻️ Reiniciar progreso</button></div>';
  app.innerHTML=h;window.scrollTo(0,0);
}
function backBtn(){return '<button class="back" onclick="home()">← Mapa</button>';}

function block(idx){
  var b=GAME[idx];
  var h=backBtn();
  h+='<div class="card center"><div class="n small">Misión '+(idx+1)+'</div><h1 style="font-size:1.25rem">'+inl(b.title)+'</h1>'+
     '<span class="tag">Mejor: '+(save.best[b.id]||0)+' XP'+(save.jefe[b.id]?' · 👑 jefe vencido':'')+'</span></div>';
  if(b.mision){h+='<div class="card"><div class="small" style="color:var(--gold)">⚔️ Misión</div><div>'+inl(b.mision)+'</div></div>';}
  h+='<div class="card btn-row3">'+
     '<button class="btn-gold" onclick="quiz('+idx+')">🎯 Quiz ('+b.questions.length+')</button>'+
     '<button onclick="cards('+idx+')">🃏 Flashcards ('+b.flashcards.length+')</button>'+
     '<button onclick="jefe('+idx+')">👹 Jefe Final</button>'+
     '</div>';
  h+='<div class="card btn-row">'+
     (b.mnemo.length?'<button onclick="mnemo('+idx+')">🧠 Mnemotecnia</button>':'<button onclick="trucos()">🧠 Trucos</button>')+
     '<button onclick="rawview('+idx+')">📖 Texto completo</button></div>';
  app.innerHTML=h;window.scrollTo(0,0);
}

/* ----- quiz runner ----- */
var Q={};
function quiz(idx){
  var b=GAME[idx];
  if(!b.questions.length){toast('Este bloque no tiene quiz, ¡usa flashcards!');return cards(idx);}
  Q={idx:idx,i:0,score:0,correct:0};
  renderQ();
}
function renderQ(){
  var b=GAME[Q.idx], q=b.questions[Q.i];
  var h=backBtn();
  h+='<div class="prog">Misión: '+inl(b.title)+' · Pregunta '+(Q.i+1)+'/'+b.questions.length+' · <span class="pill">'+q.pts+' pts</span></div>';
  h+='<div class="card"><div style="font-size:1.08rem;margin-bottom:6px">'+inl(q.q||q.label)+'</div>';
  if(q.type==='mc'){
    h+='<div id="opts">';
    q.opts.forEach(function(o,k){h+='<button class="opt" onclick="answer('+k+')">'+String.fromCharCode(65+k)+') '+inl(o)+'</button>';});
    h+='</div>';
  }else{
    h+='<div id="opts"><button class="btn-gold" onclick="reveal()">🔎 Revelar respuesta</button></div>';
  }
  h+='<div id="after"></div></div>';
  app.innerHTML=h;window.scrollTo(0,0);
}
function lockOpts(){var o=document.getElementById('opts');var bs=o.querySelectorAll('button');bs.forEach(function(x){x.disabled=true;});}
function answer(k){
  var b=GAME[Q.idx], q=b.questions[Q.i];
  var bs=document.getElementById('opts').querySelectorAll('button');
  lockOpts();
  bs[q.correct].classList.add('correct');
  var ok=(k===q.correct);
  if(!ok)bs[k].classList.add('wrong');
  if(ok){Q.score+=q.pts;Q.correct++;}
  var aft=document.getElementById('after');
  aft.innerHTML=(ok?'<div class="expl">✅ <b>¡Correcto!</b> +'+q.pts+' XP</div>':'<div class="expl">❌ La correcta era <b>'+String.fromCharCode(65+q.correct)+'</b>.</div>')+
    (q.expl?'<div class="expl">💡 '+inl(q.expl)+'</div>':'')+
    '<button class="btn-gold" style="margin-top:10px" onclick="nextQ()">'+(Q.i+1<b.questions.length?'Siguiente ▶':'Ver resultado 🏁')+'</button>';
  if(ok)toast('+'+q.pts+' XP');
}
function reveal(){
  var b=GAME[Q.idx], q=b.questions[Q.i];
  lockOpts();
  var aft=document.getElementById('after');
  aft.innerHTML='<div class="expl">📝 <b>Respuesta:</b> '+inl(q.ans||q.expl||'(ver texto)')+'</div>'+
    (q.expl&&q.ans?'<div class="expl">💡 '+inl(q.expl)+'</div>':'')+
    '<div class="small" style="margin-top:8px">¿La sabías?</div>'+
    '<div class="btn-row" style="margin-top:6px"><button class="btn-gold" onclick="selfScore(true)">✅ La sabía (+'+q.pts+')</button><button onclick="selfScore(false)">❌ A repasar</button></div>';
}
function selfScore(ok){
  var b=GAME[Q.idx], q=b.questions[Q.i];
  if(ok){Q.score+=q.pts;Q.correct++;toast('+'+q.pts+' XP');}
  nextQ();
}
function nextQ(){
  var b=GAME[Q.idx];
  if(Q.i+1<b.questions.length){Q.i++;renderQ();}
  else finishQuiz();
}
function finishQuiz(){
  var b=GAME[Q.idx];
  var prev=save.best[b.id]||0, improved=false;
  if(Q.score>prev){save.best[b.id]=Q.score;improved=true;persist();}
  var xpBefore=totalXP();
  refreshXP();
  var rankNow=rankFor(totalXP())[1];
  var h=backBtn();
  h+='<div class="card center"><h1 style="font-size:1.3rem">🏁 Misión completada</h1>'+
     '<div style="font-size:2rem;margin:6px">'+Q.correct+'/'+b.questions.length+'</div>'+
     '<div>Puntuación: <b>'+Q.score+' XP</b>'+(improved?' <span class="pill">¡nuevo récord!</span>':' <span class="small">(récord: '+prev+')</span>')+'</div>'+
     '<div class="small" style="margin-top:6px">Rango actual: <b>'+rankNow+'</b> · '+totalXP()+' XP totales</div>'+
     '<div class="btn-row" style="margin-top:14px"><button class="btn-gold" onclick="quiz('+Q.idx+')">🔁 Reintentar</button><button onclick="jefe('+Q.idx+')">👹 Jefe Final</button></div>'+
     '<button style="margin-top:10px" onclick="home()">← Volver al mapa</button></div>';
  app.innerHTML=h;window.scrollTo(0,0);
  if(b.questions.length&&Q.correct===b.questions.length)toast('¡Pleno! 🌟');
}

/* ----- flashcards ----- */
var FC={};
function cards(idx){
  var b=GAME[idx];
  if(!b.flashcards.length){toast('Sin flashcards en este bloque');return block(idx);}
  FC={idx:idx,i:0,flip:false};renderFC();
}

}
function flipFC(){FC.flip=!FC.flip;renderFC();}
function moveFC(d){var b=GAME[FC.idx];FC.i=(FC.i+d+b.flashcards.length)%b.flashcards.length;FC.flip=false;renderFC();}

/* ----- jefe ----- */
function jefe(idx){
  var b=GAME[idx];
  var h=backBtn();
  if(!b.jefe){h+='<div class="card center">Este bloque no tiene Jefe Final. 😌</div>';app.innerHTML=h;return;}
  h+='<div class="card"><div class="center" style="font-size:1.6rem">👹</div>'+
     '<div class="center pill" style="display:block;margin:6px auto;width:fit-content">JEFE FINAL · 50 XP</div>'+
     '<div style="font-size:1.05rem;margin:10px 0">'+inl(b.jefe.q)+'</div>'+
     '<div class="small">Intenta responder de memoria (en voz alta o por escrito). Luego revela el modelo.</div>'+
     '<div id="jbox"><button class="btn-gold" style="margin-top:10px" onclick="revealJefe('+idx+')">🔎 Revelar respuesta modelo</button></div></div>';
  app.innerHTML=h;window.scrollTo(0,0);
}
function revealJefe(idx){
  var b=GAME[idx];
  var box=document.getElementById('jbox');
  box.innerHTML='<div class="expl">📜 <b>Respuesta modelo:</b><br>'+inl(b.jefe.ans)+'</div>'+
    '<div class="small" style="margin-top:8px">¿Lo clavaste?</div>'+
    '<div class="btn-row" style="margin-top:6px"><button class="btn-gold" onclick="winJefe('+idx+')">👑 ¡Sí! (+50 XP)</button><button onclick="block('+idx+')">❌ A repasar</button></div>';
}
function winJefe(idx){
  var b=GAME[idx];
  if(!save.jefe[b.id]){save.jefe[b.id]=true;persist();toast('👑 +50 XP · ¡Jefe vencido!');}
  else toast('Jefe ya vencido 😎');
  refreshXP();block(idx);
}

/* ----- mnemo / trucos / raw ----- */
function mnemo(idx){
  var b=GAME[idx];
  var h=backBtn()+'<div class="card"><h1 style="font-size:1.2rem">🧠 Mnemotecnia — '+inl(b.title)+'</h1>';
  b.mnemo.forEach(function(m){h+='<div class="expl">'+inl(m)+'</div>';});
  if(!b.mnemo.length)h+='<div class="small">Sin truco específico; mira los 🧠 Trucos globales.</div>';
  h+='<button style="margin-top:10px" onclick="trucos()">🧠 Ver todos los trucos</button></div>';
  app.innerHTML=h;window.scrollTo(0,0);
}
function renderMd(linesArr){
  var out='',inTable=false;
  linesArr.forEach(function(ln){
    if(/^\s*$/.test(ln)){out+='<br>';return;}
    var h=ln.match(/^(#{1,6})\s+(.*)$/);
    if(h){out+='<h3>'+inl(h[2])+'</h3>';return;}
    if(/^\s*\|/.test(ln)){
      var cells=ln.split('|').map(function(c){return c.trim();}).filter(function(c){return c.length;});
      if(cells.every(function(c){return /^:?-{2,}:?$/.test(c);}))return;
      out+='<div>• '+cells.map(function(c){return inl(c);}).join(' — ')+'</div>';return;
    }
    if(/^\s*[-*]\s+/.test(ln)){out+='<div style="margin-left:8px">• '+inl(ln.replace(/^\s*[-*]\s+/,''))+'</div>';return;}
    if(/^>\s?/.test(ln)){out+='<div class="expl">'+inl(ln.replace(/^>\s?/,''))+'</div>';return;}
    if(/^---+$/.test(ln)){out+='<hr class="hr">';return;}
    out+='<div>'+inl(ln)+'</div>';
  });
  return out;
}
function rawview(idx){
  var b=GAME[idx];
  var h=backBtn()+'<div class="card rawmd"><h1 style="font-size:1.2rem">📖 '+inl(b.title)+' — texto completo</h1>'+renderMd(b.raw)+'</div>';
  app.innerHTML=h;window.scrollTo(0,0);
}
function trucos(){
  var h=backBtn()+'<div class="card rawmd"><h1 style="font-size:1.2rem">🧠 Trucos &amp; Mnemotecnia</h1>'+renderMd(DATA.trucos)+'</div>';
  app.innerHTML=h;window.scrollTo(0,0);
}
function resetAll(){
  if(confirm('¿Seguro que quieres borrar todo tu progreso (XP y récords)?')){
    save={total:0,best:{},jefe:{}};persist();refreshXP();toast('Progreso reiniciado');home();
  }
}

/* ---------- go ---------- */
home();
</script>
